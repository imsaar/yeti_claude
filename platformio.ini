; ============================================================
; YETI — Expressive Interactive Robot Companion
; ESP32-C3 Mini  |  0.96" SSD1306 OLED
; SDA → GPIO8  |  SCL → GPIO9  |  Touch → GPIO7
; ============================================================
[env:yeti]
platform  = espressif32
board     = lolin_c3_mini
framework = arduino

; Serial monitor
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default

; Upload
upload_speed = 460800

; Use ARM64-native toolchain (required for Apple Silicon Macs)
platform_packages =
    espressif/toolchain-riscv32-esp@12.2.0+20230208

; Build flags
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=1
    -march=rv32imc_zicsr_zifencei

; Libraries
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.9
    adafruit/Adafruit SH110X@^2.1.10
    adafruit/Adafruit GFX Library@^1.11.10
    bblanchon/ArduinoJson@^7.2.0
